name: Check Source Branch

on:
  pull_request:
    branches: [main]

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is develop
        if: ${{ github.head_ref != 'develop' }}
        run: |
          echo "Error: Only PRs from 'develop' branch are allowed into 'main'."
          exit 1